services:
  - type: web
    name: shivsrushti-cashbook
    env: node
    region: singapore
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cashbook-db
          property: connectionString
      - key: NODE_VERSION
        value: 18

databases:
  - name: cashbook-db
    region: singapore
    plan: free
    databaseName: cashbook
    user: cashbook_user
